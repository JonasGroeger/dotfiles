---

- name: Install Python 2
  apt: name={{ item }} state=latest update_cache=yes cache_valid_time=3600
  with_items:
    - python
    - python-dev
    - ipython
  become: true

- name: Install Python3
  apt: name={{ item }} state=latest update_cache=yes cache_valid_time=3600
  with_items:
    - python3
    - python3-pip
    - python3-venv
    - python3-wheel
    - python3-dev
    - ipython3
  become: true

- name: Link pypirc
  file:
    src: "{{ role_path }}/files/pypirc"
    dest: "/home/{{ username }}/.pypirc"
    state: link
    force: yes

- name: Upgrade debian pip3
  pip: name=pip executable=pip3 extra_args="--upgrade --ignore-installed"
  become: true

- name: Install Python 3 Tools
  pip: name="{{ item }}" executable=pip3
  with_items:
    - pipenv
    - cookiecutter
    - ansible-lint
  become: true
