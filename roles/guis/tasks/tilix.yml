---

- apt:
    name: apt-transport-https
    state: latest
  become: true

- apt_repository:
    repo: "ppa:webupd8team/terminix"
    filename: tilix
  become: true

- apt:
    name: tilix
    state: latest
  become: true

- name: Load Tilix config
  shell: echo "{{ lookup('file', 'tilix.dconf') }}" | dconf load /com/gexperts/Tilix/
